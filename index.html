<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Medium RAG Assistant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px;
    }

    .container {
      width: 100%;
      max-width: 720px;
    }

    header {
      margin-bottom: 40px;
    }

    header h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    header p {
      color: #666;
      font-size: 15px;
      line-height: 1.5;
    }

    .search-box {
      display: flex;
      gap: 10px;
      margin-bottom: 32px;
    }

    .search-box input {
      flex: 1;
      padding: 12px 16px;
      font-size: 15px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      outline: none;
      background: #fff;
      transition: border-color 0.2s;
    }

    .search-box input:focus {
      border-color: #1a1a1a;
    }

    .search-box button {
      padding: 12px 22px;
      font-size: 15px;
      font-weight: 600;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .search-box button:hover { background: #333; }
    .search-box button:disabled { background: #999; cursor: not-allowed; }

    .answer-box {
      background: #fff;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      padding: 24px;
      margin-bottom: 24px;
      display: none;
    }

    .answer-box h2 {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888;
      margin-bottom: 12px;
    }

    .answer-box p {
      font-size: 15px;
      line-height: 1.7;
      color: #1a1a1a;
      white-space: pre-wrap;
    }

    .sources-box {
      display: none;
    }

    .sources-box h2 {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888;
      margin-bottom: 12px;
    }

    .source-card {
      background: #fff;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 10px;
    }

    .source-card .title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .source-card .meta {
      font-size: 13px;
      color: #888;
      margin-bottom: 8px;
    }

    .source-card .score {
      display: inline-block;
      font-size: 12px;
      background: #f0f0f0;
      color: #555;
      padding: 2px 8px;
      border-radius: 20px;
    }

    .source-card .chunk {
      font-size: 13px;
      color: #555;
      margin-top: 8px;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .error {
      color: #d00;
      font-size: 14px;
      margin-bottom: 16px;
      display: none;
    }

    .loader {
      display: none;
      align-items: center;
      gap: 8px;
      color: #666;
      font-size: 14px;
      margin-bottom: 24px;
    }

    .loader span {
      width: 18px;
      height: 18px;
      border: 2px solid #ddd;
      border-top-color: #1a1a1a;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Medium RAG Assistant</h1>
      <p>Type your question below. The assistant searches a dataset of Medium articles stored in Pinecone and uses OpenAI to generate a grounded answer based on the retrieved content.</p>
    </header>

    <div class="search-box">
      <input type="text" id="question" placeholder="e.g. What are the best articles about machine learning?" />
      <button id="askBtn" onclick="ask()">Ask</button>
    </div>

    <div class="error" id="error"></div>
    <div class="loader" id="loader"><span></span> Searching articles and generating answer...</div>

    <div class="answer-box" id="answerBox">
      <h2>Answer</h2>
      <p id="answerText"></p>
    </div>

    <div class="sources-box" id="sourcesBox">
      <h2>Retrieved Articles</h2>
      <div id="sourcesList"></div>
    </div>
  </div>

  <script>
    document.getElementById("question").addEventListener("keydown", function(e) {
      if (e.key === "Enter") ask();
    });

    async function ask() {
      const question = document.getElementById("question").value.trim();
      if (!question) return;

      const btn = document.getElementById("askBtn");
      const loader = document.getElementById("loader");
      const answerBox = document.getElementById("answerBox");
      const sourcesBox = document.getElementById("sourcesBox");
      const errorEl = document.getElementById("error");

      btn.disabled = true;
      loader.style.display = "flex";
      answerBox.style.display = "none";
      sourcesBox.style.display = "none";
      errorEl.style.display = "none";

      try {
        const res = await fetch("/api/prompt", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question }),
        });

        if (!res.ok) throw new Error(`Server error: ${res.status}`);
        const data = await res.json();

        document.getElementById("answerText").textContent = data.response;
        answerBox.style.display = "block";

        const list = document.getElementById("sourcesList");
        list.innerHTML = "";
        const seen = new Set();
        data.context.forEach(item => {
          if (seen.has(item.title)) return;
          seen.add(item.title);
          list.innerHTML += `
            <div class="source-card">
              <div class="title">${item.title}</div>
              <div class="meta">Article ID: ${item.article_id} &nbsp;·&nbsp; <span class="score">score ${item.score.toFixed(3)}</span></div>
              <div class="chunk">${item.chunk}</div>
            </div>`;
        });
        sourcesBox.style.display = "block";

      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.style.display = "block";
      } finally {
        btn.disabled = false;
        loader.style.display = "none";
      }
    }
  </script>
</body>
</html>
