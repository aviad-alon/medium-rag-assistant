<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Medium RAG Assistant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px;
    }

    .container {
      width: 100%;
      max-width: 720px;
    }

    header {
      margin-bottom: 40px;
    }

    header h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    header p {
      color: #888;
      font-size: 15px;
      line-height: 1.5;
    }

    .search-box {
      display: flex;
      gap: 10px;
      margin-bottom: 32px;
    }

    .search-box input {
      flex: 1;
      padding: 12px 16px;
      font-size: 15px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      outline: none;
      background: #fff;
      transition: border-color 0.2s;
    }

    .search-box input:focus { border-color: #1a1a1a; }

    .search-box button {
      padding: 12px 22px;
      font-size: 15px;
      font-weight: 600;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .search-box button:hover { background: #333; }
    .search-box button:disabled { background: #999; cursor: not-allowed; }

    .error {
      color: #c00;
      font-size: 14px;
      margin-bottom: 16px;
      display: none;
    }

    .loader {
      display: none;
      align-items: center;
      gap: 8px;
      color: #888;
      font-size: 14px;
      margin-bottom: 24px;
    }

    .loader span {
      width: 16px;
      height: 16px;
      border: 2px solid #ddd;
      border-top-color: #1a1a1a;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Answer box */
    .answer-box {
      background: #fff;
      border: 1.5px solid #e0e0e0;
      border-left: 3px solid #1a1a1a;
      border-radius: 10px;
      padding: 20px 24px;
      margin-bottom: 28px;
      display: none;
      animation: fadeIn 0.3s ease;
    }

    .answer-box h2 {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #aaa;
      margin-bottom: 10px;
    }

    .answer-box p {
      font-size: 15px;
      line-height: 1.75;
      color: #1a1a1a;
      white-space: pre-wrap;
    }

    /* Sources */
    .sources-box { display: none; }

    .sources-box h2 {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #aaa;
      margin-bottom: 12px;
    }

    .source-card {
      background: #fff;
      border: 1.5px solid #e8e8e8;
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 8px;
      transition: box-shadow 0.2s, border-color 0.2s;
      animation: fadeIn 0.3s ease;
    }

    .source-card:hover {
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      border-color: #d0d0d0;
    }

    .source-card .title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 3px;
    }

    .source-card .title a {
      color: #1a1a1a;
      text-decoration: none;
    }

    .source-card .title a:hover { text-decoration: underline; }

    .source-card .author {
      font-size: 13px;
      color: #888;
      margin-bottom: 10px;
    }

    .score-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 20px;
      margin-bottom: 10px;
      background: #f0f0f0;
      color: #666;
    }

    .source-card .chunk {
      font-size: 13px;
      color: #666;
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* System config */
    .system-config {
      margin-top: 40px;
      padding-top: 18px;
      border-top: 1px solid #e8e8e8;
      font-size: 12px;
      color: #bbb;
    }

    .system-config strong { color: #999; font-weight: 500; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Medium RAG Assistant</h1>
      <p>Enter a question to find relevant Medium articles and receive a focused, context-based answer.</p>
    </header>

    <div class="search-box">
      <input type="text" id="question" placeholder="e.g. What are the best articles about machine learning?" />
      <button id="askBtn" onclick="ask()">Ask</button>
    </div>

    <div class="error" id="error"></div>
    <div class="loader" id="loader"><span></span> Searching articles and generating answer...</div>

    <div class="answer-box" id="answerBox">
      <h2>Answer</h2>
      <p id="answerText"></p>
    </div>

    <div class="sources-box" id="sourcesBox">
      <h2>Retrieved Articles</h2>
      <div id="sourcesList"></div>
    </div>

    <div class="system-config" id="systemConfig"></div>
  </div>

  <script>
    fetch("/api/stats").then(r => r.json()).then(s => {
      document.getElementById("systemConfig").innerHTML =
        `<strong>System config</strong> &nbsp;·&nbsp; Chunk size: ${s.chunk_size} words &nbsp;·&nbsp; Overlap: ${Math.round(s.overlap_ratio * 100)}% &nbsp;·&nbsp; Top-K: ${s.top_k}`;
    });

    document.getElementById("question").addEventListener("keydown", e => {
      if (e.key === "Enter") ask();
    });

    function cleanAuthor(raw) {
      return raw.replace(/[\[\]'\"]/g, "").trim();
    }

    async function ask() {
      const question = document.getElementById("question").value.trim();
      if (!question) return;

      const btn = document.getElementById("askBtn");
      const loader = document.getElementById("loader");
      const answerBox = document.getElementById("answerBox");
      const sourcesBox = document.getElementById("sourcesBox");
      const errorEl = document.getElementById("error");

      btn.disabled = true;
      loader.style.display = "flex";
      answerBox.style.display = "none";
      sourcesBox.style.display = "none";
      errorEl.style.display = "none";

      try {
        const res = await fetch("/api/prompt", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question }),
        });

        if (!res.ok) throw new Error(`Server error: ${res.status}`);
        const data = await res.json();

        document.getElementById("answerText").textContent = data.response;
        answerBox.style.display = "block";

        if (data.response.includes("I don't know based on the provided Medium articles data")) {
          return;
        }

        const list = document.getElementById("sourcesList");
        list.innerHTML = "";
        const seen = new Set();
        data.context.forEach(item => {
          if (seen.has(item.title)) return;
          seen.add(item.title);
          const searchUrl = `https://medium.com/search?q=${encodeURIComponent(item.title)}`;
          const author = item.author ? cleanAuthor(item.author) : "";
          list.innerHTML += `
            <div class="source-card">
              <div class="title"><a href="${searchUrl}" target="_blank" rel="noopener">${item.title}</a></div>
              ${author ? `<div class="author">By ${author}</div>` : ""}
              <span class="score-badge">${item.score.toFixed(3)} relevance</span>
              <div class="chunk">${item.chunk}</div>
            </div>`;
        });
        sourcesBox.style.display = "block";

      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.style.display = "block";
      } finally {
        btn.disabled = false;
        loader.style.display = "none";
      }
    }
  </script>
</body>
</html>
